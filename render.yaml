services:
  - type: web
    name: taskflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /app/data/taskflow.json
      - key: UPLOADS_DIR
        value: /app/data/uploads
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
    disk:
      name: taskflow-data
      mountPath: /app/data
      sizeGB: 1
